name: CI / CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20.19.0", "22.16.0", "24.12.0"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js || (echo "Missing client ESM output" && exit 1)
          test -f dist/index.cjs || (echo "Missing client CJS output" && exit 1)
          test -f dist/index.d.ts || (echo "Missing client type declarations" && exit 1)
          test -f dist/index.d.cts || (echo "Missing client CJS type declarations" && exit 1)
          test -f dist/server.js || (echo "Missing server ESM output" && exit 1)
          test -f dist/server.cjs || (echo "Missing server CJS output" && exit 1)
          test -f dist/server.d.ts || (echo "Missing server type declarations" && exit 1)
          test -f dist/server.d.cts || (echo "Missing server CJS type declarations" && exit 1)

  publish:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.12.0"
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
